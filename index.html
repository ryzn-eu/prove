<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTV Cloud Automatizzata</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Player TV Responsivo 16:9 */
        .tv-wrapper { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            background: #000; 
            border: 2px solid #333; 
            border-radius: 8px; 
            user-select: none;
        }
        
        #player-box {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        
        /* Blocco interazioni assolute su video e iframe */
        #player-box iframe, #player-box video, #yt-player-element { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100% !important; 
            height: 100% !important; 
            border: 0; 
            pointer-events: none; 
        }
        
        /* 📡 SCHERMATA ANTENNA (Sintonizzazione) */
        .antenna-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Courier New', Courier, monospace; pointer-events: none;
        }
        .antenna-text { color: #00adb5; font-size: 1.4rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 8px; animation: blink 1s infinite; }
        .antenna-subtext { color: #666; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; }
        .antenna-overlay::after { content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%); background-size: 100% 4px; z-index: 10000; }

        /* 🎬 OVERLAY PUBBLICITÀ (Solo al cambio programma) */
        .adv-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; z-index: 9999; display: flex; justify-content: center; align-items: center;
            overflow: hidden; pointer-events: none;
        }
        .adv-overlay video { width: 100%; height: 100%; object-fit: cover; }
        .adv-badge { position: absolute; top: 15px; left: 15px; background: rgba(0, 0, 0, 0.8); color: #ffcc00; padding: 6px 12px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; border: 1px solid #ffcc00; border-radius: 4px; z-index: 10000; font-family: monospace; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .status { margin: 15px 0; padding: 10px; background: #222; border-left: 5px solid #00adb5; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00adb5; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .queue-list { list-style: none; padding: 0; }
        .queue-item { padding: 10px; background: #2a2a2a; margin-bottom: 5px; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1>📺 WebTV Cloud</h1>

    <div class="tv-wrapper">
        <div id="player-box"></div>
        
        <div id="antenna-overlay" class="antenna-overlay" style="display: none;">
            <div class="antenna-text">📡 SINTONIZZAZIONE CANALE...</div>
            <div class="antenna-subtext">Attendere prego</div>
        </div>

        <div id="adv-overlay" class="adv-overlay" style="display: none;">
            <div class="adv-badge">Pubblicità</div>
            <video id="adv-video-element" src="https://www.w3schools.com/html/mov_bbb.mp4" loop muted playsinline></video>
        </div>
    </div>
    
    <div id="status-text" class="status">Sincronizzazione canale...</div>

    <div class="dashboard">
        <div class="card">
            <h3>Aggiungi Video</h3>
            <input type="text" id="v-url" placeholder="URL Video (YouTube o MP4)">
            <input type="number" id="v-durata" placeholder="Durata (secondi)">
            <button id="btn-add">Aggiungi al Palinsesto</button>
        </div>
        <div class="card">
            <h3>Coda di Riproduzione</h3>
            <ul class="queue-list" id="list-queue"></ul>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Inizializzazione API YouTube
    if (!window.YT) {
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
    }

    const firebaseConfig = {
      apiKey: "AIzaSyBOAf7-sE1GoyJkkmywWV3K5nZO_VDy5GU",
      authDomain: "palinsesto-75399.firebaseapp.com",
      databaseURL: "https://palinsesto-75399-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "palinsesto-75399",
      storageBucket: "palinsesto-75399.firebasestorage.app",
      messagingSenderId: "1033591071601",
      appId: "1:1033591071601:web:d3812a387de05bc93dccd0",
      measurementId: "G-8F7NHHE67W"
    };

    const db = getDatabase(initializeApp(firebaseConfig));
    const queueRef = ref(db, 'palinsesto_queue');
    
    let currentKey = null;
    let currentQueueData = {};
    let isFirstBoot = true;         
    let ytPlayerInstance = null;    

    // LOGICA AGGIUNTA VIDEO
    document.getElementById('btn-add').onclick = async () => {
        const url = document.getElementById('v-url').value;
        const durata = parseInt(document.getElementById('v-durata').value);
        if(!url || !durata) return alert("Compila tutto!");

        const snapshot = await get(queueRef);
        let startTime = Date.now();
        if(snapshot.exists()) {
            const items = snapshot.val();
            Object.values(items).forEach(v => {
                const end = v.startTime + (v.durata * 1000);
                if(end > startTime) startTime = end;
            });
        }
        push(queueRef, { url, durata, startTime });
        document.getElementById('v-url').value = '';
        document.getElementById('v-durata').value = '';
    };

    // MOTORE DI GESTIONE FLUSSI VIDEO
    function startLiveContent(v, elapsedSeconds) {
        const advOverlay = document.getElementById('adv-overlay');
        const advVideo = document.getElementById('adv-video-element');
        const antennaOverlay = document.getElementById('antenna-overlay');

        if (isFirstBoot) {
            antennaOverlay.style.display = 'flex';
        } else {
            advOverlay.style.display = 'flex';
            if(advVideo) {
                advVideo.currentTime = 0;
                advVideo.play().catch(() => {}); 
            }
        }

        if (v.url.includes('youtu')) {
            const match = v.url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            const videoId = (match && match[2].length === 11) ? match[2] : '';
            
            const initYTPlayer = () => {
                document.getElementById('player-box').innerHTML = '<div id="yt-player-element"></div>';
                
                ytPlayerInstance = new window.YT.Player('yt-player-element', {
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 1, 'controls': 0, 'disablekb': 1, 'fs': 0, 'modestbranding': 1, 'rel': 0,
                        'start': elapsedSeconds, 'iv_load_policy': 3, 'vq': 'hd1080'
                    },
                    events: {
                        'onReady': (event) => {
                            if (isFirstBoot) {
                                event.target.mute();
                            } else {
                                event.target.unMute();
                            }
                            event.target.setVolume(100);
                            event.target.setPlaybackQuality('hd1080');
                            event.target.playVideo();
                        },
                        'onStateChange': (event) => {
                            if (event.data === 1) { // 1 = PLAYING
                                if (isFirstBoot) {
                                    // Mantiene il tempo lungo originale per il primo avvio di YouTube
                                    setTimeout(() => {
                                        antennaOverlay.style.display = 'none';
                                        isFirstBoot = false;
                                    }, 4500);
                                } else {
                                    setTimeout(() => {
                                        advOverlay.style.display = 'none';
                                        if(advVideo) advVideo.pause();
                                    }, 5000);
                                }
                            }
                        }
                    }
                });
            };

            if (typeof window.YT !== 'undefined' && window.YT.Player) {
                initYTPlayer();
            } else {
                const checkReady = setInterval(() => {
                    if (typeof window.YT !== 'undefined' && window.YT.Player) {
                        clearInterval(checkReady); initYTPlayer();
                    }
                }, 100);
            }

        } else {
            document.getElementById('player-box').innerHTML = `<video id="native-player" src="${v.url}" autoplay></video>`;
            const videoEl = document.getElementById('native-player');
            videoEl.currentTime = elapsedSeconds;
            
            if (isFirstBoot) { videoEl.muted = true; } else { videoEl.muted = false; videoEl.volume = 1.0; }
            
            videoEl.onplaying = () => {
                if (isFirstBoot) {
                    setTimeout(() => { antennaOverlay.style.display = 'none'; isFirstBoot = false; }, 1500);
                } else {
                    setTimeout(() => { advOverlay.style.display = 'none'; if(advVideo) advVideo.pause(); }, 2000);
                }
            };
        }
    }

    // REGOLATORE PALINSESTO FIREBASE
    function renderPlayer() {
        const now = Date.now();
        const listEl = document.getElementById('list-queue');
        listEl.innerHTML = "";
        
        let found = false;
        Object.entries(currentQueueData).forEach(([key, v]) => {
            const end = v.startTime + (v.durata * 1000);
            if(end > now) {
                const isCurrent = (now >= v.startTime && now < end);
                const color = isCurrent ? "#00adb5" : "#fff";
                listEl.innerHTML += `<li class="queue-item" style="color: ${color}">
                    ${new Date(v.startTime).toLocaleTimeString()} - ${v.url.split('/').pop()}
                </li>`;
            }

            if(now >= v.startTime && now < end) {
                found = true;
                if(currentKey !== key) {
                    currentKey = key;
                    const elapsedSeconds = Math.floor((now - v.startTime) / 1000);
                    startLiveContent(v, elapsedSeconds);
                }
                document.getElementById('status-text').innerText = "🔴 In onda: " + v.url;
            }
        });

        if(!found) {
            document.getElementById('player-box').innerHTML = `<div style="text-align:center; padding-top:20%;">Nessun programma in onda.</div>`;
            document.getElementById('status-text').innerText = "In attesa del prossimo contenuto...";
            currentKey = null;
        }
    }

    onValue(queueRef, (snapshot) => {
        currentQueueData = snapshot.val() || {};
        renderPlayer();
    });

    // --- SISTEMA DI RISINCRONIZZAZIONE TELEVISIVA AL RIENTRO NELLA SCHEDA ---

    document.addEventListener("visibilitychange", () => {
        // Quando l'utente esce dalla scheda, blocca i player per risparmiare risorse
        if (document.hidden) {
            if (ytPlayerInstance && typeof ytPlayerInstance.pauseVideo === 'function') {
                ytPlayerInstance.pauseVideo();
            }
            const nativePlayer = document.getElementById('native-player');
            if (nativePlayer) nativePlayer.pause();
        } 
        // Quando l'utente RIENTRA nella scheda (Ricollegamento al Canale)
        else {
            // Se è il primissimo avvio assoluto della pagina, lascia gestire le tempistiche a startLiveContent
            if (isFirstBoot) {
                forceLiveSync();
            } else {
                const antennaOverlay = document.getElementById('antenna-overlay');
                
                // 1. Mostra subito la schermata antenna (nasconde le interfacce brutte di YouTube)
                antennaOverlay.style.display = 'flex';
                
                // 2. Calcola l'orario reale in diretta e sposta il player in avanti di nascosto
                forceLiveSync();

                // 3. Rimuove la schermata antenna dopo esattamente 2 SECONDI (2000 ms) come richiesto
                setTimeout(() => {
                    antennaOverlay.style.display = 'none';
                }, 2000);
            }
        }
    });

    // Controllo passivo ogni 10 secondi per micro-allineamenti se la scheda resta sempre visibile
    setInterval(() => {
        if (!document.hidden) {
            forceLiveSync(); 
        }
    }, 10000);

    function forceLiveSync() {
        if (!currentKey || !currentQueueData[currentKey]) return;
        
        const now = Date.now();
        const v = currentQueueData[currentKey];
        const end = v.startTime + (v.durata * 1000);
        
        if (now >= end) {
            renderPlayer();
            return;
        }

        const exactElapsedSeconds = Math.floor((now - v.startTime) / 1000);

        // --- ALLINEAMENTO YOUTUBE ---
        if (ytPlayerInstance && typeof ytPlayerInstance.getCurrentTime === 'function' && v.url.includes('youtu')) {
            const ytTime = ytPlayerInstance.getCurrentTime();
            if (Math.abs(exactElapsedSeconds - ytTime) > 2) {
                ytPlayerInstance.seekTo(exactElapsedSeconds, true);
                ytPlayerInstance.playVideo();
            }
        } 
        // --- ALLINEAMENTO MP4 NATIVO ---
        else {
            const nativePlayer = document.getElementById('native-player');
            if (nativePlayer) {
                const nativeTime = nativePlayer.currentTime;
                if (Math.abs(exactElapsedSeconds - nativeTime) > 2) {
                    nativePlayer.currentTime = exactElapsedSeconds;
                    nativePlayer.play().catch(()=>{});
                }
            }
        }
    }

</script>

</body>
</html>
