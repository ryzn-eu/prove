<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTV Cloud Automatizzata</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Player TV Responsivo */
        .tv-wrapper { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            background: #000; 
            border: 2px solid #333; 
            border-radius: 8px; 
            user-select: none;
        }
        
        /* Contenitore interno del player */
        #player-box {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        
        /* BLOCCATA OGNI INTERAZIONE SUL PLAYER (Niente click o tocchi) */
        #player-box iframe, #player-box video, #yt-player-element { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100% !important; 
            height: 100% !important; 
            border: 0; 
            pointer-events: none; 
        }
        
        /* SCHERMATA ANTENNA: COPERTURA TOTALE IN PRIMO PIANO */
        .antenna-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000; /* Nero assoluto per assorbire i flash di YouTube */
            z-index: 9999; /* Sempre sopra all'iframe */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            pointer-events: none;
        }

        .antenna-text {
            color: #00adb5;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 8px;
            animation: blink 1s infinite;
        }

        .antenna-subtext {
            color: #666;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Effetto linee CRT stile televisore */
        .antenna-overlay::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            z-index: 10000;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .status { margin: 15px 0; padding: 10px; background: #222; border-left: 5px solid #00adb5; }
        
        /* Dashboard */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00adb5; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        .queue-list { list-style: none; padding: 0; }
        .queue-item { padding: 10px; background: #2a2a2a; margin-bottom: 5px; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1>📺 WebTV Cloud</h1>

    <div class="tv-wrapper">
        <div id="player-box"></div>
        
        <div id="antenna-overlay" class="antenna-overlay">
            <div class="antenna-text">📡 SINTONIZZAZIONE CANALE...</div>
            <div class="antenna-subtext">Attendere prego</div>
        </div>
    </div>
    
    <div id="status-text" class="status">Sincronizzazione in corso...</div>

    <div class="dashboard">
        <div class="card">
            <h3>Aggiungi Video</h3>
            <input type="text" id="v-url" placeholder="URL Video (YouTube o MP4)">
            <input type="number" id="v-durata" placeholder="Durata (secondi)">
            <button id="btn-add">Aggiungi al Palinsesto</button>
        </div>
        <div class="card">
            <h3>Coda di Riproduzione</h3>
            <ul class="queue-list" id="list-queue"></ul>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Carica l'API iframe di YouTube se non presente
    if (!window.YT) {
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
    }

    const firebaseConfig = {
      apiKey: "AIzaSyBOAf7-sE1GoyJkkmywWV3K5nZO_VDy5GU",
      authDomain: "palinsesto-75399.firebaseapp.com",
      databaseURL: "https://palinsesto-75399-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "palinsesto-75399",
      storageBucket: "palinsesto-75399.firebasestorage.app",
      messagingSenderId: "1033591071601",
      appId: "1:1033591071601:web:d3812a387de05bc93dccd0",
      measurementId: "G-8F7NHHE67W"
    };

    const db = getDatabase(initializeApp(firebaseConfig));
    const queueRef = ref(db, 'palinsesto_queue');
    
    let currentKey = null;
    let currentQueueData = {};

    // INSERIMENTO CODA
    document.getElementById('btn-add').onclick = async () => {
        const url = document.getElementById('v-url').value;
        const durata = parseInt(document.getElementById('v-durata').value);
        if(!url || !durata) return alert("Compila tutto!");

        const snapshot = await get(queueRef);
        let startTime = Date.now();
        if(snapshot.exists()) {
            const items = snapshot.val();
            Object.values(items).forEach(v => {
                const end = v.startTime + (v.durata * 1000);
                if(end > startTime) startTime = end;
            });
        }
        
        push(queueRef, { url, durata, startTime });
        alert("Video aggiunto!");
        document.getElementById('v-url').value = '';
        document.getElementById('v-durata').value = '';
    };

    // GESTORE PLAYER CON FILTRO DI COPERTURA AUTOMATICO
    function startLiveContent(v, elapsedSeconds) {
        // Appena parte un nuovo video (o si torna dal background), tiriamo su l'antenna
        document.getElementById('antenna-overlay').style.display = 'flex';

        if (v.url.includes('youtu')) {
            const match = v.url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            const videoId = (match && match[2].length === 11) ? match[2] : '';
            
            const initYTPlayer = () => {
                document.getElementById('player-box').innerHTML = '<div id="yt-player-element"></div>';
                
                new window.YT.Player('yt-player-element', {
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 1,
                        'mute': 1,       // Mute necessario per costringere l'app all'autoplay senza blocchi del browser
                        'controls': 0,
                        'disablekb': 1,
                        'fs': 0,
                        'modestbranding': 1,
                        'rel': 0,
                        'start': elapsedSeconds,
                        'iv_load_policy': 3
                    },
                    events: {
                        'onReady': (event) => {
                            event.target.mute();
                            event.target.playVideo();
                        },
                        'onStateChange': (event) => {
                            // STATO 1 = PLAYING (Il video è iniziato ed è in esecuzione dietro la schermata nera)
                            if (event.data === 1) {
                                // 🌟 IL TRUCCO: Invece di spegnere subito l'antenna, aspettiamo 4.5 secondi.
                                // Durante questo tempo il video scorre sotto, la grafica iniziale di YouTube scompare nel buio,
                                // e l'utente visualizzerà l'interfaccia solo quando il video sarà completamente pulito.
                                setTimeout(() => {
                                    document.getElementById('antenna-overlay').style.display = 'none';
                                }, 4500); // Puoi aumentare a 5000 (5 secondi) se noti che sul tuo dispositivo i loghi ci mettono di più a sparire
                            }
                        }
                    }
                });
            };

            if (typeof window.YT !== 'undefined' && window.YT.Player) {
                initYTPlayer();
            } else {
                const checkReady = setInterval(() => {
                    if (typeof window.YT !== 'undefined' && window.YT.Player) {
                        clearInterval(checkReady);
                        initYTPlayer();
                    }
                }, 100);
            }

        } else {
            // Player Nativo MP4
            document.getElementById('player-box').innerHTML = `<video id="native-player" src="${v.url}" autoplay muted></video>`;
            const videoEl = document.getElementById('native-player');
            videoEl.currentTime = elapsedSeconds;
            
            videoEl.onplaying = () => {
                setTimeout(() => {
                    document.getElementById('antenna-overlay').style.display = 'none';
                }, 1500); // Per i file MP4 diretti bastano 1.5 secondi perché non hanno loghi nativi
            };
        }
    }

    // REGOLATORE DI FLUSSO
    function renderPlayer() {
        const now = Date.now();
        const listEl = document.getElementById('list-queue');
        listEl.innerHTML = "";
        
        let found = false;
        Object.entries(currentQueueData).forEach(([key, v]) => {
            const end = v.startTime + (v.durata * 1000);
            
            if(end > now) {
                const isCurrent = (now >= v.startTime && now < end);
                const color = isCurrent ? "#00adb5" : "#fff";
                listEl.innerHTML += `<li class="queue-item" style="color: ${color}">
                    ${new Date(v.startTime).toLocaleTimeString()} - ${v.url.split('/').pop()}
                </li>`;
            }

            if(now >= v.startTime && now < end) {
                found = true;
                if(currentKey !== key) {
                    currentKey = key;
                    const elapsedSeconds = Math.floor((now - v.startTime) / 1000);
                    startLiveContent(v, elapsedSeconds);
                }
                document.getElementById('status-text').innerText = "🔴 In onda (Sincronizzato): " + v.url;
            }
        });

        if(!found) {
            document.getElementById('player-box').innerHTML = `<div style="text-align:center; padding-top:20%;">Nessun programma in onda.</div>`;
            document.getElementById('status-text').innerText = "In attesa del prossimo contenuto...";
            document.getElementById('antenna-overlay').style.display = 'none';
            currentKey = null;
        }
    }

    onValue(queueRef, (snapshot) => {
        currentQueueData = snapshot.val() || {};
        renderPlayer();
    });

    // COMPORTAMENTO AL RISVEGLIO DALLO SFONDO (BACK TO FOREGROUND)
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'visible') {
            // Resettiamo la chiave per forzare la distruzione del vecchio player e l'apertura del nuovo.
            // Questo farà ripartire da zero la logica dell'antenna e il filtro cieco di 4.5 secondi.
            currentKey = null; 
            renderPlayer(); 
        }
    });
</script>

</body>
</html>
